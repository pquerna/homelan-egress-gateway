server:
    interface: 0.0.0.0
    port: 53

    access-control: 192.168.32.0/20 allow
    access-control: 127.0.0.0/8 allow

    hide-identity: yes
    hide-version: yes

    qname-minimisation: yes
    harden-glue: yes
    harden-dnssec-stripped: yes

    log-queries: yes
    log-replies: no
    use-syslog: no
